{% extends 'recipes/base.html' %}

{% block content %}

<h1 class="mb-4">➕ Add Experiment</h1>

<div class="card recipe-card shadow p-4">

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Title</label>
{{ form.title }}
</div>

<div class="mb-3">
<label class="form-label">Description</label>
{{ form.description }}
</div>

<button type="submit" class="btn btn-primary">
Save Experiment
</button>

</form>

</div>

{% endblock %}
