<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FlavorForge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
background:#fff6f6;
font-family: 'Segoe UI', sans-serif;
}

/* ===== NAVBAR ===== */

.navbar{
background: linear-gradient(90deg,#ff6b81,#ff4757);
border-radius:0 0 20px 20px;
padding:12px 0;
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* ===== CARDS ===== */

.recipe-card{
border-radius:20px;
border:none;
overflow:hidden;
transition:0.3s;
}

.recipe-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ===== CARD IMAGE ===== */

.card-img-top{
height:220px;
object-fit:cover;
}

/* ===== BUTTONS ===== */

.btn-primary{
background:#ff6b81;
border:none;
border-radius:12px;
padding:8px 16px;
}

.btn-primary:hover{
background:#ff4757;
}

/* ===== SEARCH ===== */

.search-box{
border-radius:15px;
padding:10px;
border:1px solid #eee;
}

/* ===== MOBILE ===== */

@media (max-width:768px){

.navbar-brand{
font-size:20px;
}

.container{
padding:15px;
}

.card-img-top{
height:180px;
}

}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container d-flex justify-content-between align-items-center">

<a class="navbar-brand" href="/">🍳 FlavorForge</a>

<div>

<a class="btn btn-light me-2" href="/">Recipes</a>
<a class="btn btn-light me-2" href="/statistics/">Statistics</a>
<a class="btn btn-light me-3" href="/top-recipes/">Top Recipes</a>

{% if user.is_authenticated %}

<span class="text-white me-2">
👤 {{ user.username }}
</span>

<form action="{% url 'logout' %}" method="post" style="display:inline;">
{% csrf_token %}
<button class="btn btn-light">
Logout
</button>
</form>

{% else %}

<a class="btn btn-light me-2" href="{% url 'login' %}">
Login
</a>

<a class="btn btn-light" href="{% url 'signup' %}">
Register
</a>

{% endif %}

</div>

</div>

</nav>

<div class="container mt-4">

<!-- ⭐ MENSAJES DEL SISTEMA -->

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}

{% block content %}

{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
